<mat-chip-listbox class="flex flex-wrap gap-2" multiple aria-label="Filter options">
  @for (option of options(); track option) {
    <mat-chip-option
      [selected]="selected().includes(option)"
      (click)="toggle(option)"
      class="!min-h-8 !rounded-md !border !border-zinc-700 !bg-zinc-950 !text-sm !text-zinc-100"
    >
      {{ option }}
    </mat-chip-option>
  }
</mat-chip-listbox>
