@if (state.loading()) {
  <div class="flex h-80 items-center justify-center rounded-lg border border-zinc-800 bg-zinc-900/60 text-zinc-400">
    {{ 'common.loading' | transloco }}
  </div>
} @else if (state.loadError()) {
  <div class="flex h-80 items-center justify-center rounded-lg border border-red-900/70 bg-red-950/30 text-red-300">
    {{ state.loadError()! | transloco }}
  </div>
} @else if (state.pagedItems().length === 0) {
  <div class="flex h-80 flex-col items-center justify-center rounded-lg border border-zinc-800 bg-zinc-900/60 text-zinc-400">
    <mat-icon class="!h-10 !w-10 !text-4xl !text-zinc-600">search_off</mat-icon>
    <span class="mt-2">{{ 'common.noResults' | transloco }}</span>
  </div>
} @else {
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4">
    @for (item of state.pagedItems(); track item.id) {
      <app-item-card [item]="item" />
    }
  </div>
}

<mat-paginator
  class="mt-4 rounded-lg border border-zinc-800 !bg-zinc-900 !text-zinc-100 lg:hidden"
  [length]="state.totalCount()"
  [pageIndex]="state.pageIndex()"
  [pageSize]="state.pageSize()"
  [pageSizeOptions]="[10, 20, 50, 100]"
  (page)="onPage($event)"
  [attr.aria-label]="'items.pageSize' | transloco"
/>
