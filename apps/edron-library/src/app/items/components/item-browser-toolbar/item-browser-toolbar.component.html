<mat-toolbar class="!min-h-16 !border-b !border-zinc-800 !bg-zinc-950/95 !px-3 !text-zinc-100 sm:!px-4">
  <div class="flex min-w-0 flex-1 flex-wrap items-center gap-2">
    <button
      mat-icon-button
      class="md:!hidden"
      type="button"
      [attr.aria-label]="'filters.openCategories' | transloco"
      [matTooltip]="'items.categories' | transloco"
      (click)="categoryClicked.emit()"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="'filters.openFilters' | transloco"
      [matTooltip]="'items.filters' | transloco"
      (click)="filterClicked.emit()"
    >
      <mat-icon>filter_alt</mat-icon>
    </button>

    <button mat-button type="button" [matMenuTriggerFor]="sortMenu" class="!text-zinc-100">
      <mat-icon>sort</mat-icon>
      <span class="hidden sm:inline">{{ activeSortLabel() }}</span>
    </button>

    <mat-menu #sortMenu="matMenu">
      @for (option of sortOptions; track option.labelKey) {
        <button mat-menu-item type="button" (click)="setSort(option)">
          @if (state.sort().key === option.key && state.sort().direction === option.direction) {
            <mat-icon>check</mat-icon>
          }
          <span>{{ option.labelKey | transloco }}</span>
        </button>
      }
    </mat-menu>

    <div class="ml-auto flex items-center gap-3 text-xs text-zinc-400 sm:text-sm">
      <span class="whitespace-nowrap">
        {{ 'items.results' | transloco: { start: state.pageStart(), end: state.pageEnd(), total: state.totalCount() } }}
      </span>
    </div>

    <app-language-switcher />
  </div>

  <mat-paginator
    class="toolbar-paginator hidden !bg-transparent !text-zinc-100 lg:block"
    [length]="state.totalCount()"
    [pageIndex]="state.pageIndex()"
    [pageSize]="state.pageSize()"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="onPage($event)"
    [attr.aria-label]="'items.pageSize' | transloco"
  />
</mat-toolbar>
