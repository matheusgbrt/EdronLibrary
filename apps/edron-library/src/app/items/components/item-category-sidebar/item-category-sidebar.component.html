<aside class="flex h-full flex-col">
  <div class="border-b border-zinc-800 px-4 py-4">
    <div class="text-sm font-semibold text-zinc-100">Edron Library</div>
    <div class="mt-1 text-xs text-zinc-500">Item browser</div>
  </div>

  <nav class="flex-1 overflow-auto px-3 py-4" aria-label="Categories">
    <button
      type="button"
      class="category-button"
      [class.category-button-active]="isSelected(allCategory)"
      (click)="selectCategory(allCategory)"
    >
      <mat-icon aria-hidden="true">apps</mat-icon>
      <span>All items</span>
    </button>

    @for (group of groups; track group.label) {
      <section class="mt-5">
        <h2 class="px-2 text-xs font-semibold uppercase tracking-wide text-zinc-500">{{ group.label }}</h2>
        <div class="mt-2 space-y-1">
          @for (entry of group.entries; track entry.label) {
            <button
              type="button"
              class="category-button"
              [class.category-button-active]="isSelected(entry)"
              (click)="selectCategory(entry)"
            >
              <span class="h-1.5 w-1.5 rounded-full bg-zinc-600" aria-hidden="true"></span>
              <span>{{ entry.label }}</span>
            </button>
          }
        </div>
      </section>
    }
  </nav>
</aside>
