<mat-drawer-container class="h-screen bg-zinc-950 text-zinc-100" (backdropClick)="closeCategory()">
  <mat-drawer
    class="w-64 border-r border-zinc-800 bg-zinc-900"
    [mode]="isSmallScreen() ? 'over' : 'side'"
    [opened]="categoryOpened()"
    position="start"
    (closedStart)="closeCategory()"
  >
    <app-item-category-sidebar />
  </mat-drawer>

  <mat-drawer
    #filterDrawer
    class="w-full border-l border-zinc-800 bg-zinc-900 sm:w-[430px]"
    mode="over"
    position="end"
  >
    <app-item-filter-drawer (closeClicked)="filterDrawer.close()" />
  </mat-drawer>

  <mat-drawer-content class="flex h-screen flex-col overflow-hidden">
    <app-item-browser-toolbar
      (categoryClicked)="toggleCategory()"
      (filterClicked)="filterDrawer.toggle()"
    />

    <main class="flex-1 overflow-auto p-4">
      <app-item-card-grid />
    </main>
  </mat-drawer-content>
</mat-drawer-container>
